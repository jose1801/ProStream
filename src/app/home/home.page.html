<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title>ProStream Admin</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()" class="hover-glow-border">
        <ion-icon slot="icon-only" name="log-out-outline" style="color: #ff4961;"></ion-icon> 
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="dashboard-background ion-padding">

  <ion-card class="user-card-glow">
    <ion-item lines="none" class="user-item">
      <ion-avatar slot="start" style="border: 2px solid #38bdf8;">
        <div class="avatar-letter">{{ (usuario || 'A').charAt(0).toUpperCase() }}</div>
      </ion-avatar>
      <ion-label>
        <p style="color: #94a3b8; font-size: 12px; margin-bottom: 4px;">Bienvenido de vuelta,</p>
        <h2 style="color: white; font-weight: bold; font-size: 18px;">{{ usuario || 'Administrador' }}</h2>
      </ion-label>
    </ion-item>
  </ion-card>

  <h3 class="section-subtitle" style="color: #e2e8f0; margin-left: 15px; margin-top: 25px;">Módulos del Sistema</h3>

  <ion-grid fixed class="ion-no-padding">
    <ion-row>
      
      <ion-col size="6" size-md="4">
        <ion-card class="menu-card menu-card-glow" (click)="irClientes()" button="true">
          <ion-card-content class="menu-card-content">
            <div class="icon-box color-clientes">
              <ion-icon name="people-outline"></ion-icon>
            </div>
            <h3 class="card-title">Clientes</h3>
            <p class="card-desc">Gestionar abonados</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6" size-md="4">
        <ion-card class="menu-card menu-card-glow" (click)="irServicios()" button="true">
          <ion-card-content class="menu-card-content">
            <div class="icon-box color-servicios">
              <ion-icon name="tv-outline"></ion-icon>
            </div>
            <h3 class="card-title">Servicios</h3>
            <p class="card-desc">Cuentas y pantallas</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6" size-md="4">
        <ion-card class="menu-card menu-card-glow" (click)="irAuditoria()" button="true">
          <ion-card-content class="menu-card-content">
            <div class="icon-box color-auditoria">
              <ion-icon name="shield-checkmark-outline"></ion-icon>
            </div>
            <h3 class="card-title">Auditoría</h3>
            <p class="card-desc">Historial de control</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

    </ion-row>
  </ion-grid>

</ion-content>
