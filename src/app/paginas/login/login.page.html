<ion-content class="ion-padding ion-text-center" style="--background: #1e1e24;">
  <div style="margin-top: 15%; margin-bottom: 20px;">
    <h1 style="color: white; font-weight: bold; letter-spacing: 2px;">STREAM CIPHER</h1>
    <p style="color: #a2a2a2; font-size: 14px;">Panel Administrativo de Control</p>
  </div>

  <ion-card style="background: white; border-radius: 16px; text-align: left;">
    <ion-card-header>
      <ion-card-title style="font-size: 20px; font-weight: bold;">Iniciar Sesión</ion-card-title>
    </ion-card-header>

    <ion-card-content class="ion-no-padding">
      <ion-list lines="inset" class="ion-padding-horizontal">
        <ion-item>
          <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
          <ion-input [(ngModel)]="usuario.usr_usuario" type="text" placeholder="Usuario de acceso"></ion-input>
        </ion-item>

        <ion-item class="ion-margin-top">
          <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
          <ion-input [(ngModel)]="usuario.usr_clave" type="password" placeholder="Contraseña"></ion-input>
        </ion-item>
      </ion-list>

      <div class="ion-padding">
        <ion-button expand="block" color="dark" style="--border-radius: 8px;" (click)="ejecutarLogin()" [disabled]="!usuario.usr_usuario || !usuario.usr_clave">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          Ingresar al Sistema
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
